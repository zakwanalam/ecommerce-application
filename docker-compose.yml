services:
  db:
    image: mysql:8.0
    container_name: ecommerce-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: test
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./Schema/Ecommerce_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build: ./backend
    container_name: ecommerce-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=test
      - DB_PORT=3306
      - TOKEN_EXPIRY=24h
      - SERVER_IP=backend
    depends_on:
      db:
        condition: service_healthy

  website:
    build: ./website
    container_name: ecommerce-website
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      - backend
    volumes:
      - ./website:/usr/src/app
      - /usr/src/app/node_modules

  admin-panel:
    build: ./adminPanel
    container_name: ecommerce-admin-panel
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      - backend
    volumes:
      - ./adminPanel:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db-data:
